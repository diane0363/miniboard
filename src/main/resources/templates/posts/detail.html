<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/base}">

<head>
    <title th:text="${post.title}">게시글</title>
    <!-- ★ 이 페이지에만 필요한 jQuery — base의 head에 자동 병합된다 -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <main layout:fragment="content" class="post-detail">
        <h1 th:text="${post.title}"></h1>

        <!-- 작성자·날짜를 메타 영역으로 -->
        <div class="post-meta">
            작성자 <span th:text="${post.authorNickname}"></span>
        </div>

        <!-- 본문 -->
        <div class="post-content" th:text="${post.content}"></div>

        <!-- 하단 액션 버튼들 -->
        <div class="post-actions">
            <a th:href="@{/posts}" class="btn">목록</a>
            <span th:if="${isOwner}" style="display:flex; gap:8px;">
                <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn">수정</a>
                <button type="button" id="deleteBtn" th:data-id="${post.id}" class="btn-danger">삭제</button>
            </span>
        </div>

        <script th:inline="javascript">
            // CSRF 토큰은 base의 head meta에서 읽는다 (공통화된 것 재사용)
            const csrfToken = $("meta[name='_csrf']").attr("content");
            const csrfHeader = $("meta[name='_csrf_header']").attr("content");

            $("#deleteBtn").on("click", function () {
                if (!confirm("정말 삭제하시겠습니까?")) return;
                const postId = $(this).data("id");
                $.ajax({
                    url: "/posts/" + postId, type: "DELETE",
                    beforeSend: function (xhr) { xhr.setRequestHeader(csrfHeader, csrfToken); },
                    success: function () { alert("삭제되었습니다."); window.location.href = "/posts"; },
                    error: function (xhr) {
                        if (xhr.status === 403) alert("본인 글만 삭제할 수 있습니다.");
                        else alert("삭제 중 오류가 발생했습니다.");
                    }
                });
            });
        </script>
    </main>
</body>

</html>
