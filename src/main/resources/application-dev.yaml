spring:
  datasource:
    url: jdbc:mysql://localhost:3306/miniboard?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD}          # 코드에 평문 박지 마라 (5단계)
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update                # 로컬만 update. 운영은 validate (5단계)
    show-sql: true
    properties:
      hibernate.format_sql: true
  thymeleaf:
    cache: false                      # 개발 중 템플릿 즉시 반영
logging:
  level:
    org.hibernate.SQL: debug