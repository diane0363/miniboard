<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/base}"> <!-- ★ base를 입겠다 -->

<head>
    <title>게시판</title> <!-- 이 페이지 제목 -->
</head>

<body>
    <!-- ★ base의 layout:fragment="content" 자리에 이게 들어간다 -->
    <main layout:fragment="content">
        <!-- ★ 제목 + 글쓰기 버튼을 한 줄로 -->
        <div class="list-header">
            <h1>게시판</h1>
            <a th:href="@{/posts/new}" class="btn">글쓰기</a> <!-- class="btn" 추가 -->
        </div>

        <table border>
            <thead>
                <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>작성자</th>
                    <th>작성일</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="post : ${posts.content}">
                    <td th:text="${post.id}"></td>
                    <td><a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}"></a></td>
                    <td th:text="${post.authorNickname}"></td>
                    <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                </tr>
                <tr th:if="${posts.isEmpty()}">
                    <td colspan="4">등록된 게시글이 없습니다.</td>
                </tr>
            </tbody>
        </table>

        <!-- <div th:if="${posts.totalPages > 0}">
            <a th:if="${posts.hasPrevious()}" th:href="@{/posts(page=${posts.number - 1})}">이전</a>
            <span th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}">
                <a th:href="@{/posts(page=${i})}" th:text="${i + 1}"
                    th:style="${i == posts.number} ? 'font-weight:bold' : ''"></a>
            </span>
            <a th:if="${posts.hasNext()}" th:href="@{/posts(page=${posts.number + 1})}">다음</a>
        </div> -->

        <!-- ★ 페이징 div에 class="pagination" 추가 -->
        <div class="pagination" th:if="${posts.totalPages > 0}">
            <a th:if="${posts.hasPrevious()}" th:href="@{/posts(page=${posts.number - 1})}">이전</a>
            <span th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}">
                <a th:href="@{/posts(page=${i})}" th:text="${i + 1}"
                    th:style="${i == posts.number} ? 'font-weight:bold' : ''"></a>
            </span>
            <a th:if="${posts.hasNext()}" th:href="@{/posts(page=${posts.number + 1})}">다음</a>
        </div>
    </main>
</body>

</html>
